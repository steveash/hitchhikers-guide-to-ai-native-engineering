name: Weekly Repo Scanner

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:       # Manual trigger for testing

permissions:
  issues: write
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run repo scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scan-repos.py

      - name: Commit registry updates
        run: |
          git config user.name "hitchhiker-bot"
          git config user.email "bot@hitchhiker-guide.dev"
          git add registry/repos.json
          git diff --staged --quiet || git commit -m "chore: update repo registry from weekly scan"
          git push
