name: Smith Rework (Human Feedback)

# Triggered when a maintainer comments "/rework" or "/rebase" on a
# guide-update PR.
#
# /rework — Fix what's here. The Smith reads your feedback and pushes
#           incremental fixes to the existing PR branch.
#
# /rebase — Start fresh. The Smith resets the branch to current main
#           and re-synthesizes the guide changes from scratch, reading
#           the original source notes + your feedback. Use this when
#           the PR has merge conflicts or the guide has diverged too
#           far for incremental fixes.
#
# Both commands collect ALL human comments on the PR as context.
# You can use either command as many times as needed.

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: smith-rework-pr-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rework:
    # Triggers on two event types with different payloads:
    # 1. issue_comment: regular PR comment containing "/rework"
    # 2. pull_request_review: submitted review containing "/rework"
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (contains(github.event.comment.body, '/rework') || contains(github.event.comment.body, '/rebase')) &&
        contains(github.event.issue.labels.*.name, 'guide-update') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR' ||
         github.event.comment.author_association == 'MEMBER')
      ) || (
        github.event_name == 'pull_request_review' &&
        (contains(github.event.review.body, '/rework') || contains(github.event.review.body, '/rebase')) &&
        contains(github.event.pull_request.labels.*.name, 'guide-update') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'COLLABORATOR' ||
         github.event.review.author_association == 'MEMBER')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number and branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM_REVIEW: ${{ github.event.pull_request.number }}
          PR_NUM_COMMENT: ${{ github.event.issue.number }}
        run: |
          # Normalize across event types — one will be set, one empty
          PR_NUMBER="${PR_NUM_REVIEW:-$PR_NUM_COMMENT}"
          if [ -z "$PR_NUMBER" ]; then
            echo "ERROR: could not determine PR number from event"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER")
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUMBER branch: $HEAD_REF"

      - name: Reset rework-attempted label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Human /rework resets the automated rework guard so the
          # assayer can do one more automated rework cycle after this.
          gh api "repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/labels/rework-attempted" \
            -X DELETE 2>/dev/null || true

      - name: Detect command
        id: cmd
        env:
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
        run: |
          if echo "$COMMENT_BODY" | grep -q '/rebase'; then
            echo "mode=rebase" >> "$GITHUB_OUTPUT"
            echo "Mode: rebase (fresh synthesis on top of main)"
          else
            echo "mode=rework" >> "$GITHUB_OUTPUT"
            echo "Mode: rework (incremental fix)"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.PROJECT_PAT }}

      - name: Configure git
        run: |
          git config user.name "hitchhiker-smith[bot]"
          git config user.email "hitchhiker-smith@users.noreply.github.com"

      - name: Reset branch to main (rebase mode)
        if: steps.cmd.outputs.mode == 'rebase'
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Branch reset to origin/main ($(git rev-parse --short HEAD))"

      - name: React to trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            # React to the review comment
            gh api "repos/${{ github.repository }}/pulls/comments/${{ github.event.review.id }}/reactions" \
              -f content="eyes" 2>/dev/null || true
          else
            gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -f content="eyes" 2>/dev/null || true
          fi

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect all human feedback and PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # Collect ALL human feedback from three sources:
          # 1. Regular PR comments (issue_comment API)
          # 2. PR review bodies (reviews API)
          # 3. Inline review comments on the diff (review comments API)

          > /tmp/human-feedback.md

          # 1. Regular PR comments
          gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --paginate --jq '.[] |
              select(.user.type != "Bot") |
              select(.body | test("/rework|/rebase") | not) |
              "### Comment by \(.user.login) at \(.created_at)\n\n\(.body)\n"
            ' >> /tmp/human-feedback.md 2>/dev/null || true

          # 2. PR review bodies (the top-level review summary)
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --paginate --jq '.[] |
              select(.user.type != "Bot") |
              select(.body != null and .body != "") |
              select(.body | test("/rework|/rebase") | not) |
              "### Review by \(.user.login) at \(.submitted_at) [\(.state)]\n\n\(.body)\n"
            ' >> /tmp/human-feedback.md 2>/dev/null || true

          # 3. Inline review comments (on specific lines/files)
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
            --paginate --jq '.[] |
              select(.user.type != "Bot") |
              "### Inline comment by \(.user.login) on \(.path):\(.line // .original_line // "?")\n\n\(.body)\n"
            ' >> /tmp/human-feedback.md 2>/dev/null || true

          LINES=$(wc -l < /tmp/human-feedback.md)
          echo "Collected $LINES lines of reviewer feedback"

          # For rebase mode: extract the PR body so the Smith knows what
          # source notes this PR was originally synthesizing
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" \
            --jq '.body' > /tmp/pr-body.md 2>/dev/null || true

      - name: Run Smith (rework mode)
        if: steps.cmd.outputs.mode == 'rework'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/smith-prompt.txt <<'PROMPT_EOF'
          You are the Smith agent reworking a guide-update PR based on
          human reviewer feedback. Read agents/SMITH.md for your role
          and quality bar.

          Human reviewers have left feedback on this PR. ALL of their
          comments are collected in /tmp/human-feedback.md — read the
          entire file. Address all feedback points holistically in a
          single pass. Comments are in chronological order; if later
          comments contradict earlier ones, prefer the latest.

          Your task:
          1. Read /tmp/human-feedback.md — every comment, start to finish.
          2. Read the files mentioned or implied by the feedback.
          3. Make ONLY the changes the reviewers asked for. Do not expand
             scope, do not refactor, do not "improve" things they didn't
             mention.
          4. Do NOT edit source-notes/, agents/, scripts/, or .github/.

          ## Sticky note extraction

          After addressing the feedback, review each comment for
          generalizable lessons — patterns the Smith should always
          follow (or avoid) when synthesizing this chapter in the
          future. Only create a sticky note when the feedback reveals
          a recurring editorial standard, not a one-time fix.

          If you identify generalizable lessons:
          a) Read the relevant sticky-notes/chNN-*.md file
          b) Find the next SN-NN-NNN ID (look at the index table)
          c) Append the new note using the exact format from the file
             header (Type: prescriptive or conditional, Status: active)
          d) Add it to the index table
          e) Include the sticky-notes file in your commit

          ## Commit and push

          After all changes (guide fixes + any new sticky notes):
            git add guide/ sticky-notes/
            if git diff --staged --quiet; then
              echo "No changes needed."
              exit 0
            fi
            git commit -m "smith: address reviewer feedback"
            git push
          PROMPT_EOF

          claude -p "$(cat /tmp/smith-prompt.txt)" \
            --max-turns 30 \
            --allowedTools "Bash(*)" "Read" "Edit" "Glob" "Grep" "WebFetch"

      - name: Run Smith (rebase mode)
        if: steps.cmd.outputs.mode == 'rebase'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/smith-prompt.txt <<'PROMPT_EOF'
          You are the Smith agent re-synthesizing guide chapters from
          scratch after a rebase. Read agents/SMITH.md for your role,
          synthesis process, and quality bar.

          ## Context

          This PR previously had guide chapter changes, but the branch
          has been reset to current main because of merge conflicts or
          divergence. You need to re-do the synthesis fresh.

          The original PR description is at /tmp/pr-body.md — read it
          to understand which source notes triggered this PR and what
          chapters were affected.

          Human reviewers have also left feedback in /tmp/human-feedback.md.
          Read it and incorporate their guidance into your synthesis.
          Human editorial direction outranks source notes.

          ## Your task

          1. Read /tmp/pr-body.md to identify the source notes this PR
             was synthesizing.
          2. Read /tmp/human-feedback.md for reviewer guidance.
          3. Read agents/SMITH.md for synthesis rules and quality bar.
          4. Read the sticky-notes files for affected chapters.
          5. Read the source notes identified in the PR body.
          6. Read the current guide chapters (they are now up-to-date
             on main — your branch IS main).
          7. Synthesize the source notes into the guide chapters,
             following SMITH.md rules, sticky notes, and reviewer
             feedback.
          8. Do NOT edit source-notes/, agents/, scripts/, or .github/.

          ## Commit and push

            git add guide/ sticky-notes/
            if git diff --staged --quiet; then
              echo "No changes needed after rebase."
              exit 0
            fi
            git commit -m "smith: re-synthesize after rebase"
            git push --force-with-lease
          PROMPT_EOF

          claude -p "$(cat /tmp/smith-prompt.txt)" \
            --max-turns 60 \
            --allowedTools "Bash(*)" "Read" "Write" "Edit" "Glob" "Grep" "WebFetch"

      - name: Notify success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "Smith rework complete — pushed fixes based on your feedback. The assayer will re-review automatically."

      - name: Notify failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "Smith rework failed — check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
