name: Smith on source-notes merge

# Pipeline 2 entry point: when source-notes/ changes land on main, the
# Smith re-synthesizes the affected guide chapters and opens a
# `guide-update` PR for the Assayer (`.github/workflows/assayer.yml`)
# to gate.
#
# Triggers in practice:
#   - Miner PRs merging        (a brand-new source note hits main)
#   - Gardener PRs merging     (staleness sweep edits frontmatter)
#   - Manual edits             (admin or Assayer follow-ups)
#
# "Affected chapters" is computed by greping `guide/*.md` for inline
# `[source: <slug>]` citations to the changed notes. If a changed note
# is brand new and no chapter cites it yet, the Smith is told to read
# every chapter and decide where (if anywhere) the new evidence belongs.
#
# Diff-aware mode (hi-4yk.15): in addition to the file lists, the
# workflow extracts a unified `git diff` of every changed source note
# and writes it to `$RUNNER_TEMP/source-notes-diff.txt`. The Smith
# reads that file and only re-synthesizes claims whose backing
# evidence actually moved — see `agents/SMITH.md` → "Diff-aware
# synthesis mode". This turns Gardener `last_checked:` bumps into
# empty PRs instead of churn PRs, and lets the Smith skip claims
# whose evidence is unchanged.

on:
  push:
    branches: [main]
    paths:
      - 'source-notes/**'
  workflow_dispatch:           # manual trigger for testing / re-runs

permissions:
  contents: write              # smith pushes its feature branch
  pull-requests: write         # smith opens the guide-update PR

jobs:
  smith:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git diff <before>..<after>` works even
          # if the merge queue lands a multi-commit batch in one push.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity for Smith commits
        run: |
          git config user.name  "hitchhiker-smith[bot]"
          git config user.email "hitchhiker-smith@users.noreply.github.com"

      - name: Compute affected source notes and chapters
        id: affected
        run: |
          set -euo pipefail

          # Determine the diff range. For push events GitHub gives us
          # `before` and `after`; for workflow_dispatch we fall back to
          # the previous commit on main.
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          if [ -z "$AFTER" ]; then
            AFTER="HEAD"
          fi
          echo "Diff range: $BEFORE..$AFTER"

          # Source notes added or modified in this push. Skip deletes
          # (Smith can't synthesize from a missing file) and the
          # template files under `source-notes/.template-*`.
          CHANGED=$(
            git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER" \
              -- 'source-notes/*.md' \
              | grep -v '^source-notes/\.' || true
          )

          if [ -z "$CHANGED" ]; then
            echo "No source-note changes (after excluding templates/deletes). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed source notes:"
          printf '  %s\n' $CHANGED

          # Chapters that already cite at least one of the changed notes.
          # We grep `guide/*.md` (excluding `SOURCES.md`, which is just
          # an index) for the inline `[source: <slug>` citation pattern.
          # Slugs in this corpus are unique compounds (no shared
          # prefixes) so the two-stage `grep -F` filter is safe.
          AFFECTED=""
          for note in $CHANGED; do
            slug=$(basename "$note" .md)
            for ch in guide/*.md; do
              [ "$(basename "$ch")" = "SOURCES.md" ] && continue
              if grep -F "[source:" "$ch" | grep -Fq "$slug"; then
                AFFECTED="$AFFECTED $ch"
              fi
            done
          done
          AFFECTED=$(printf '%s\n' $AFFECTED | sort -u | tr '\n' ' ' | sed 's/ $//')

          echo "Affected chapters: ${AFFECTED:-<none — new source, Smith will scan all chapters>}"

          {
            echo "changed_notes<<NOTES_EOF"
            echo "$CHANGED"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "affected_chapters<<CHAPTERS_EOF"
            echo "$AFFECTED"
            echo "CHAPTERS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Stash the diff range so the next step can extract per-note
          # diffs without re-deriving BEFORE/AFTER. $RUNNER_TEMP is the
          # GitHub-Actions-blessed per-job temp dir that survives
          # across steps in the same job.
          echo "$BEFORE" > "$RUNNER_TEMP/diff-before.txt"
          echo "$AFTER"  > "$RUNNER_TEMP/diff-after.txt"

      - name: Extract per-note source-note diffs
        id: diffs
        if: steps.affected.outputs.skip != 'true'
        run: |
          set -euo pipefail

          BEFORE=$(cat "$RUNNER_TEMP/diff-before.txt")
          AFTER=$(cat "$RUNNER_TEMP/diff-after.txt")
          DIFF_FILE="$RUNNER_TEMP/source-notes-diff.txt"

          # Build a single annotated unified diff covering every changed
          # source note. We scope to source-notes/*.md (excluding
          # templates) so unrelated paths in the merged batch can't
          # leak in. The Smith reads this file and uses it as the
          # ground truth for "what actually changed" — see
          # agents/SMITH.md → "Diff-aware synthesis mode".
          {
            echo "# Source-note diffs for ${BEFORE}..${AFTER}"
            echo "#"
            echo "# Each hunk below is a unified diff of one changed source note."
            echo "# Use this as the source of truth for which claims to re-synthesize."
            echo "# Frontmatter-only changes (e.g. Gardener last_checked bumps) should"
            echo "# NOT produce chapter edits — see agents/SMITH.md."
            echo
            git diff --unified=3 --diff-filter=AM "$BEFORE" "$AFTER" \
              -- 'source-notes/*.md' ':!source-notes/.*'
          } > "$DIFF_FILE"

          # Sanity-check the diff file isn't empty (the changed-files
          # step already filtered, so an empty diff here is a bug).
          if [ ! -s "$DIFF_FILE" ]; then
            echo "ERROR: diff file is empty after filtering — aborting." >&2
            exit 1
          fi

          BYTES=$(wc -c < "$DIFF_FILE")
          LINES=$(wc -l < "$DIFF_FILE")
          echo "Wrote per-note diff to $DIFF_FILE ($BYTES bytes, $LINES lines)"
          echo "diff_file=$DIFF_FILE" >> "$GITHUB_OUTPUT"

      - name: Run Smith synthesis
        if: steps.affected.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # gh CLI needs GH_TOKEN to push the branch and open the PR.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # GitHub-controlled values (run_id, repository, sha) are safe
          # to interpolate. The changed-notes / affected-chapters lists
          # are filenames computed by `git diff` and `grep` above — also
          # safe. The bodies of the source notes are NOT interpolated;
          # the Smith reads them via the filesystem.
          prompt: |
            You are the Smith agent for the hitchhiker-guide repo.
            Read `agents/SMITH.md` first — that file is your role,
            synthesis process, citation rules, and quality bar. Pay
            particular attention to the **Diff-aware synthesis mode**
            section: this run is in diff-aware mode, NOT batch mode.
            The Assayer will gate this PR against those same standards.

            ## Trigger

            Source notes changed on main at commit ${{ github.sha }}.

            ## Inputs (diff-aware mode)

            Newly merged or updated source notes:
            ${{ steps.affected.outputs.changed_notes }}

            Chapters that already cite at least one of those notes
            (computed by greping `[source: <slug>]` in `guide/*.md`):
            ${{ steps.affected.outputs.affected_chapters }}

            Per-note unified diff for the merged commit range:
            ${{ steps.diffs.outputs.diff_file }}

            **Read the diff file before deciding what to edit.** It is
            the source of truth for what actually changed. Frontmatter-
            only or whitespace-only diffs (e.g. a Gardener
            `last_checked` bump) must NOT produce chapter edits — exit
            cleanly with no PR in that case.

            If the affected-chapters list above is empty, the changed
            sources are not yet cited anywhere — read every chapter
            under `guide/` (excluding `guide/SOURCES.md`, which is an
            index, not a chapter) and decide which one(s), if any, the
            new evidence belongs in.

            ## Your task

            1. Read `agents/SMITH.md` end-to-end. Follow its synthesis
               process (§1–§7) AND the diff-aware operating rules.
            2. Read the per-note diff file above. Identify which
               specific claims (not just which chapters) the diff
               actually touches. If the diff is metadata-only across
               every changed note, skip to step 7 with no edits.
            3. Read each changed source note listed above (you need the
               full body to disambiguate context, even though the diff
               is the ground truth for what's new).
            4. Read each affected chapter (or, if the affected list is
               empty, every chapter under `guide/` other than
               `SOURCES.md`).
            5. Update ONLY the claims whose backing evidence actually
               moved in the diff. For each revised claim:
               - Add or revise `[source: <slug>] [grade]` inline
                 citations per agents/SMITH.md §3. Any new slug you
                 cite must appear in the diff file — do not pull in
                 unrelated sources.
               - Re-grade only if the new evidence crosses a confidence
                 threshold in agents/SMITH.md §6. Leave unchanged
                 claims alone.
               - Surface contradictions explicitly per agents/SMITH.md §5.
               - Show, don't just tell — every recommendation needs the
                 concrete example required by agents/SMITH.md §4.
            6. Do NOT gold-plate. An empty PR is preferable to a churn
               PR. If no claim's evidence actually moved, open no PR.
            7. Update `guide/SOURCES.md` only if a brand-new source row
               is needed; otherwise leave it alone.

            ## Open the PR

            One PR per workflow run. Branch name:
            `smith/source-merge-${{ github.run_id }}`.

                git checkout -b smith/source-merge-${{ github.run_id }}
                git add guide/

                # If the Smith decided no chapter actually needed an
                # update, exit cleanly without opening a PR.
                if git diff --staged --quiet; then
                  echo "Smith made no chapter changes — no PR needed."
                  exit 0
                fi

                git commit -m "smith: synthesize chapters for updated sources (${{ github.sha }})"
                git push -u origin smith/source-merge-${{ github.run_id }}

            Then open the PR. Write the body to a file first to avoid
            shell quoting issues:

                cat > /tmp/smith-pr-body.md <<'PR_BODY_EOF'
                Smith synthesis triggered by source-note changes on main.

                **Trigger commit**: ${{ github.sha }}

                **Changed source notes**:
                ${{ steps.affected.outputs.changed_notes }}

                **Chapters reviewed**:
                ${{ steps.affected.outputs.affected_chapters }}

                Re-synthesized per `agents/SMITH.md`. The Assayer
                (`.github/workflows/assayer.yml`) will gate this PR on
                merge.
                PR_BODY_EOF

                gh pr create \
                  --repo ${{ github.repository }} \
                  --base main \
                  --head smith/source-merge-${{ github.run_id }} \
                  --title "guide: synthesize updates for source-note changes (${{ github.sha }})" \
                  --body-file /tmp/smith-pr-body.md \
                  --label guide-update

            ## Constraints

            - Do NOT edit anything under `source-notes/`, `agents/`,
              `scripts/`, `.github/`, or any path outside `guide/`.
              The Smith owns guide content and nothing else.
            - Do NOT merge your own PR. The Assayer reviews; humans
              merge.
            - Do NOT invent claims that aren't in the source notes.
            - The `guide-update` label is what triggers the Assayer
              workflow — the PR must carry it.
          claude_args: |
            --max-turns 60
